name: EAS Build & Submit Android

on:
  push:
    branches: ['main']

jobs:
  build_android:
    name: Build and Auto Submit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build and Submit on EAS
        run: |
          eas build --platform android --profile production --non-interactive --auto-submit --no-wait

